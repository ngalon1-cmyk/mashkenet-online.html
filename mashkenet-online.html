  // --- אחסון מקומי בדפדפן (localStorage), במקום window.storage של קלוד ---
  // הנתונים נשמרים בדפדפן הספציפי הזה בלבד. לא משותף בין מכשירים/דפדפנים.
  window.storage = {
    async get(key, shared) {
      var k = (shared ? 'shared:' : 'p:') + key;
      var v = window.localStorage.getItem(k);
      if (v === null) throw new Error('not found');
      return { key: key, value: v, shared: !!shared };
    },
    async set(key, value, shared) {
      var k = (shared ? 'shared:' : 'p:') + key;
      window.localStorage.setItem(k, value);
      return { key: key, value: value, shared: !!shared };
    },
    async delete(key, shared) {
      var k = (shared ? 'shared:' : 'p:') + key;
      window.localStorage.removeItem(k);
      return { key: key, deleted: true, shared: !!shared };
    },
    async list(prefix, shared) {
      var pfx = (shared ? 'shared:' : 'p:') + (prefix || '');
      var keys = [];
      for (var i = 0; i < window.localStorage.length; i++) {
        var k = window.localStorage.key(i);
        if (k.indexOf(pfx) === 0) keys.push(k.slice(shared ? 7 : 2));
      }
      return { keys: keys, prefix: prefix, shared: !!shared };
    }
  };
</script>

      }
